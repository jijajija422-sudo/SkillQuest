<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- Deep Forest Enamel Background -->
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b3626" />
      <stop offset="45%" stop-color="#122017" />
      <stop offset="100%" stop-color="#0a120c" />
    </linearGradient>

    <!-- Rich Gold Metallic Border & Typography -->
    <linearGradient id="og-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5c0" />
      <stop offset="25%" stop-color="#f5d77f" />
      <stop offset="60%" stop-color="#d4af37" />
      <stop offset="85%" stop-color="#a88015" />
      <stop offset="100%" stop-color="#8c6239" />
    </linearGradient>

    <!-- Shield Inner Core -->
    <linearGradient id="og-shield-inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2b2118" />
      <stop offset="100%" stop-color="#120d08" />
    </linearGradient>

    <!-- Parchment Pill Background -->
    <linearGradient id="og-parchment" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8ea" />
      <stop offset="100%" stop-color="#ebdcc0" />
    </linearGradient>

    <!-- Drop Shadow Glow -->
    <filter id="og-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.8" />
    </filter>
    <filter id="og-gold-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.65" />
    </filter>
  </defs>

  <!-- Main Background Container -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#og-bg)" />

  <!-- Background Decorative Grid & Watermark Rings -->
  <circle cx="600" cy="315" r="480" fill="none" stroke="#d4af37" stroke-width="2" stroke-opacity="0.08" stroke-dasharray="20 16" />
  <circle cx="600" cy="315" r="340" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.12" />
  <circle cx="220" cy="315" r="280" fill="none" stroke="#d4af37" stroke-width="1" stroke-opacity="0.07" />

  <!-- Outer Ornamental Frame -->
  <rect x="24" y="24" width="1152" height="582" rx="36" fill="none" stroke="url(#og-gold)" stroke-width="12" filter="url(#og-glow)" />
  <!-- Inner Filigree Frame -->
  <rect x="44" y="44" width="1112" height="542" rx="24" fill="none" stroke="#d4af37" stroke-width="3" stroke-opacity="0.4" stroke-dasharray="16 12" />

  <!-- Corner Ornamental Rivets -->
  <circle cx="60" cy="60" r="10" fill="url(#og-gold)" />
  <circle cx="1140" cy="60" r="10" fill="url(#og-gold)" />
  <circle cx="60" cy="570" r="10" fill="url(#og-gold)" />
  <circle cx="1140" cy="570" r="10" fill="url(#og-gold)" />

  <!-- Left Side: Large Guild Shield & Crossed Swords Crest -->
  <g transform="translate(140, 150) scale(0.68)" filter="url(#og-glow)">
    <!-- Main Adventurer Shield Emblem Base -->
    <path d="M 256 84 C 340 84, 396 108, 412 124 C 412 260, 370 356, 256 428 C 142 356, 100 260, 100 124 C 116 108, 172 84, 256 84 Z" fill="url(#og-gold)" />
    <!-- Inner Shield Core -->
    <path d="M 256 106 C 326 106, 374 126, 388 140 C 388 252, 350 334, 256 398 C 162 334, 124 252, 124 140 C 138 126, 186 106, 256 106 Z" fill="url(#og-shield-inner)" />
    <!-- Crossed Swords Behind / Inside Crest -->
    <g stroke="url(#og-gold)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <line x1="170" y1="310" x2="342" y2="160" />
      <path d="M 155 325 L 185 295" stroke-width="20" />
      <circle cx="150" cy="330" r="10" fill="url(#og-gold)" />
      <line x1="342" y1="310" x2="170" y2="160" />
      <path d="M 357 325 L 327 295" stroke-width="20" />
      <circle cx="362" cy="330" r="10" fill="url(#og-gold)" />
    </g>
    <!-- Center Golden Star / Mastery Diamond -->
    <polygon points="256,160 276,215 332,215 288,250 304,305 256,270 208,305 224,250 180,215 236,215" fill="url(#og-gold)" stroke="#140f07" stroke-width="6" stroke-linejoin="round" />
    <!-- Center Emerald Jewel -->
    <polygon points="256,195 268,225 298,225 274,242 284,272 256,254 228,272 238,242 214,225 244,225" fill="#10b981" />
  </g>

  <!-- Right Side Content & Typography -->
  <!-- Top Guild Tag Pill -->
  <g transform="translate(490, 145)">
    <rect x="0" y="0" width="280" height="42" rx="21" fill="url(#og-parchment)" stroke="#8c6239" stroke-width="2" filter="url(#og-gold-shadow)" />
    <text x="140" y="27" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#5c3a1a" text-anchor="middle" letter-spacing="3">
      ADVENTURER&apos;S GUILD
    </text>
  </g>

  <!-- Main Etched Title -->
  <g transform="translate(490, 260)" filter="url(#og-glow)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="88" font-weight="900" fill="url(#og-gold)" letter-spacing="2">
      SkillQuest
    </text>
  </g>

  <!-- Subtitle Text -->
  <g transform="translate(490, 330)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="28" font-weight="normal" fill="#f4ecd8" opacity="0.95" letter-spacing="0.5">
      The RPG Quest Board &amp; Bounty Registry
    </text>
    <text x="0" y="40" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#c2b59b">
      Level up real-world skills, seal proof of deeds, &amp; earn guild prestige.
    </text>
  </g>

  <!-- Feature Badges Across Bottom Right -->
  <g transform="translate(490, 440)">
    <!-- Badge 1: Quests -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="185" height="48" rx="10" fill="#1b3626" stroke="#d4af37" stroke-width="2" />
      <text x="92" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#f5d77f" text-anchor="middle">
        +500 XP Bounties
      </text>
    </g>

    <!-- Badge 2: Chronicle -->
    <g transform="translate(205, 0)">
      <rect x="0" y="0" width="195" height="48" rx="10" fill="#1b3626" stroke="#d4af37" stroke-width="2" />
      <text x="97" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#f5d77f" text-anchor="middle">
        Live Guild Chronicle
      </text>
    </g>

    <!-- Badge 3: Prestige -->
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="180" height="48" rx="10" fill="#1b3626" stroke="#d4af37" stroke-width="2" />
      <text x="90" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#f5d77f" text-anchor="middle">
        Prestige Applause
      </text>
    </g>
  </g>

  <!-- Bottom URL Watermark -->
  <text x="1130" y="565" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#d4af37" opacity="0.75" text-anchor="end" letter-spacing="1">
    skillquest.app
  </text>
</svg>
