<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Deep Forest Enamel Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a29" />
      <stop offset="50%" stop-color="#162a1e" />
      <stop offset="100%" stop-color="#0d1912" />
    </linearGradient>

    <!-- Rich Gold Metallic Border & Crest Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3b3" />
      <stop offset="25%" stop-color="#f5d77f" />
      <stop offset="55%" stop-color="#d4af37" />
      <stop offset="85%" stop-color="#aa820a" />
      <stop offset="100%" stop-color="#7a5803" />
    </linearGradient>

    <!-- Inner Shield Dark Gold -->
    <linearGradient id="shield-inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1f10" />
      <stop offset="100%" stop-color="#140f07" />
    </linearGradient>

    <!-- Subtle Glow -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.75" />
    </filter>
  </defs>

  <!-- Outer Rounded Squircle Icon Frame for App/Search Icon -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="24" filter="url(#gold-glow)" />

  <!-- Inner Ornamental Corner Rivets -->
  <circle cx="72" cy="72" r="10" fill="url(#gold-grad)" />
  <circle cx="440" cy="72" r="10" fill="url(#gold-grad)" />
  <circle cx="72" cy="440" r="10" fill="url(#gold-grad)" />
  <circle cx="440" cy="440" r="10" fill="url(#gold-grad)" />

  <!-- Inner Gold Filigree Ring -->
  <rect x="48" y="48" width="416" height="416" rx="88" fill="none" stroke="#d4af37" stroke-width="4" stroke-opacity="0.35" stroke-dasharray="12 8" />

  <!-- Main Adventurer Shield Emblem Base -->
  <path d="M 256 84 C 340 84, 396 108, 412 124 C 412 260, 370 356, 256 428 C 142 356, 100 260, 100 124 C 116 108, 172 84, 256 84 Z" fill="url(#gold-grad)" filter="url(#gold-glow)" />

  <!-- Inner Shield Core -->
  <path d="M 256 106 C 326 106, 374 126, 388 140 C 388 252, 350 334, 256 398 C 162 334, 124 252, 124 140 C 138 126, 186 106, 256 106 Z" fill="url(#shield-inner)" />

  <!-- Crossed Swords Behind / Inside Crest -->
  <g stroke="url(#gold-grad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Left to Right Sword -->
    <line x1="170" y1="310" x2="342" y2="160" />
    <path d="M 155 325 L 185 295" stroke-width="20" />
    <circle cx="150" cy="330" r="10" fill="url(#gold-grad)" />

    <!-- Right to Left Sword -->
    <line x1="342" y1="310" x2="170" y2="160" />
    <path d="M 357 325 L 327 295" stroke-width="20" />
    <circle cx="362" cy="330" r="10" fill="url(#gold-grad)" />
  </g>

  <!-- Center Golden Star / Mastery Diamond -->
  <polygon points="256,160 276,215 332,215 288,250 304,305 256,270 208,305 224,250 180,215 236,215" fill="url(#gold-grad)" stroke="#140f07" stroke-width="6" stroke-linejoin="round" filter="url(#gold-glow)" />

  <!-- Center Emerald Jewel inside Star -->
  <polygon points="256,195 268,225 298,225 274,242 284,272 256,254 228,272 238,242 214,225 244,225" fill="#10b981" />
</svg>
