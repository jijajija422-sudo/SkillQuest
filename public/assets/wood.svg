<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="wood-grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.15" numOctaves="3" result="noise" />
      <feColorMatrix type="matrix" values="
        0.1 0 0 0 0.15
        0 0.08 0 0 0.09
        0 0 0.05 0 0.05
        0 0 0 0.4 0" in="noise" result="coloredNoise" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="#24160d" />
  <rect width="400" height="400" fill="#180e08" opacity="0.6" filter="url(#wood-grain)" />
  <!-- Plank lines -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="#100804" stroke-width="3" opacity="0.7" />
  <line x1="0" y1="160" x2="400" y2="160" stroke="#100804" stroke-width="3" opacity="0.7" />
  <line x1="0" y1="240" x2="400" y2="240" stroke="#100804" stroke-width="3" opacity="0.7" />
  <line x1="0" y1="320" x2="400" y2="320" stroke="#100804" stroke-width="3" opacity="0.7" />
  <!-- Bronze corner studs on planks -->
  <circle cx="20" cy="40" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="380" cy="40" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="20" cy="120" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="380" cy="120" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="20" cy="200" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="380" cy="200" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="20" cy="280" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="380" cy="280" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="20" cy="360" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
  <circle cx="380" cy="360" r="5" fill="#8c6239" stroke="#3d2613" stroke-width="1.5" />
</svg>
