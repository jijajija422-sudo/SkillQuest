<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1aa" />
      <stop offset="30%" stop-color="#ffd700" />
      <stop offset="70%" stop-color="#cc9900" />
      <stop offset="100%" stop-color="#886600" />
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#991b1b" />
      <stop offset="50%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <filter id="medalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Red Ribbon -->
  <g filter="url(#medalShadow)">
    <polygon points="30,0 50,45 20,45" fill="url(#ribbonGrad)" />
    <polygon points="70,0 50,45 80,45" fill="url(#ribbonGrad)" />
    <polygon points="42,0 58,0 58,45 42,45" fill="#b91c1c" />
    <path d="M 25,40 L 75,40 L 68,52 L 32,52 Z" fill="#d4af37" stroke="#7a580b" stroke-width="1.5" />
  </g>

  <!-- Physical Gold Medal -->
  <g filter="url(#medalShadow)">
    <circle cx="50" cy="82" r="36" fill="url(#goldGrad)" stroke="#664d00" stroke-width="2.5" />
    <circle cx="50" cy="82" r="30" fill="none" stroke="#fff1aa" stroke-width="1.5" stroke-dasharray="3,2" />
    <circle cx="50" cy="82" r="26" fill="#b8860b" opacity="0.3" />
    <!-- Etched Star / Laurel symbol inside medal -->
    <path d="M50,58 L54,70 L67,70 L56,78 L60,90 L50,82 L40,90 L44,78 L33,70 L46,70 Z" fill="url(#goldGrad)" stroke="#7a580b" stroke-width="1" />
    <!-- Ruby center jewel -->
    <circle cx="50" cy="77" r="5" fill="#dc2626" stroke="#7f1d1d" stroke-width="1" />
    <circle cx="48.5" cy="75.5" r="1.5" fill="#fca5a5" />
  </g>
</svg>
