<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <linearGradient id="platGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#d1d5db" />
      <stop offset="80%" stop-color="#9ca3af" />
      <stop offset="100%" stop-color="#4b5563" />
    </linearGradient>
    <linearGradient id="blueRibbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
    <filter id="medalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g filter="url(#medalShadow)">
    <polygon points="30,0 50,45 20,45" fill="url(#blueRibbon)" />
    <polygon points="70,0 50,45 80,45" fill="url(#blueRibbon)" />
    <polygon points="42,0 58,0 58,45 42,45" fill="#1d4ed8" />
    <path d="M 25,40 L 75,40 L 68,52 L 32,52 Z" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5" />
  </g>

  <g filter="url(#medalShadow)">
    <circle cx="50" cy="82" r="36" fill="url(#platGrad)" stroke="#374151" stroke-width="2.5" />
    <circle cx="50" cy="82" r="30" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3,2" />
    <!-- Sapphire center jewel -->
    <polygon points="50,62 65,82 50,102 35,82" fill="#3b82f6" stroke="#1e3a8a" stroke-width="1.5" />
    <circle cx="50" cy="82" r="6" fill="#60a5fa" stroke="#1d4ed8" stroke-width="1" />
  </g>
</svg>
